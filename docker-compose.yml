services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: farmer_app
      POSTGRES_USER: farmer_app
      POSTGRES_PASSWORD: farmer_app
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmer_app -d farmer_app"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: